services:
  app:
    build: .
    image: chainbi-dashboard
    container_name: chainbi
    restart: unless-stopped
    env_file: .env                  # CH_* (ClickHouse) и PG_* (Postgres, страница «Сигналы») → в окружение контейнера
    ports:
      - "${APP_PORT:-5000}:5000"    # порт публикации на хосте; внутри всегда 5000
    volumes:
      - ./logins.db:/app/logins.db  # bind-mount: рантайм-изменения юзеров живут на хосте
    extra_hosts:
      # Чтобы CH_HOST/PG_HOST=host.docker.internal достучались до БД на хост-машине и на Linux
      # (на Docker Desktop работает и без этого). Для удалённых серверов БД не мешает.
      # Обе БД внешние: ClickHouse (аналитика) и Postgres (сигналы) в compose не входят.
      - "host.docker.internal:host-gateway"
